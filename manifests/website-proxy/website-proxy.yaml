---
apiVersion: v1
kind: Service
metadata:
  name: webflow-upstream
spec:
  type: ExternalName
  externalName: dream-code-factory.webflow.io
  ports:
    - port: 443
---
apiVersion: v1
kind: Service
metadata:
  name: github-pages-upstream
spec:
  type: ExternalName
  externalName: thedreamcodefactory.github.io
  ports:
    - port: 443
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dreamcodefactory-webflow-proxy
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    ingress.kubernetes.io/preserve-host: "false"
    ingress.kubernetes.io/secure-backends: "true"
    nginx.ingress.kubernetes.io/upstream-vhost: "dream-code-factory.webflow.io"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/server-snippet: |
      set $redirect 0;
      set $redirect_target "";

      if ($host = "www.dreamcodefactory.com") {
        set $redirect 1;
        set $redirect_target "https://dreamcodefactory.com$request_uri";
      }

      if ($request_uri ~ ^/.well-known/acme-challenge/) {
        set $redirect 0;
      }

      if ($redirect = 1) {
        return 301 $redirect_target;
      }

      proxy_ssl_name dream-code-factory.webflow.io;
      proxy_ssl_server_name on;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - dreamcodefactory.com
        - www.dreamcodefactory.com
      secretName: dreamcodefactory-tls
  rules:
    - host: dreamcodefactory.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webflow-upstream
                port:
                  number: 443
    - host: www.dreamcodefactory.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webflow-upstream
                port:
                  number: 443
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dreamcodefactory-docs-proxy
  annotations:
    nginx.ingress.kubernetes.io/upstream-vhost: "thedreamcodefactory.github.io"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      rewrite ^/wiki(/.*)?$ /docs$1 break;
      rewrite ^/docs/(.*)$ /docs/$1 break;
      proxy_ssl_name thedreamcodefactory.github.io;
      proxy_ssl_server_name on;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - dreamcodefactory.com
      secretName: dreamcodefactory-tls
  rules:
    - host: dreamcodefactory.com
      http:
        paths:
          - path: /wiki(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: github-pages-upstream
                port:
                  number: 443
